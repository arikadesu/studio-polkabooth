<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Upload Workspace</title>
  <link rel="icon" href="Assets/fish-photobooth/favicon.png" type="image/x-icon" />
  <link rel="stylesheet" href="StyleSheets/camera.css" />
  <style>#uploadPhotoInput { display: none; }</style>
</head>
<body>
  <div class="logo" onclick="window.location.href='index.html'">
    <img src="Assets/Logo/logo.png" alt="Logo">
  </div>

  <div class="status-pill" id="upload-status">Upload Photo 1</div>

  <div class="photobooth-container" id="booth">
    <canvas id="finalCanvas" width="1176" height="1470" style="display:block;"></canvas>
    <input type="file" id="uploadPhotoInput" accept="image/*" />
  </div>

  <div class="filter-tabs">
    <button class="filter-btn active" id="f-original">Original</button>
    <button class="filter-btn" id="f-vintage">Vintage</button>
    <button class="filter-btn" id="f-bw">Black & White</button>
  </div>

  <div class="controls">
    <button id="uploadPhoto">Select File</button>
    <button id="readyButton" disabled style="display:none;">Proceed</button>
  </div>

  <script src="Javascripts/upload.js"></script>
</body>
</html>
